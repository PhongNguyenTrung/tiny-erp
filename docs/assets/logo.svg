<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="tiny-erp logo">
  <title>tiny-erp</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#38BDF8"/>
      <stop offset="55%"  stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <radialGradient id="shine" cx="22%" cy="18%" r="75%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="55%"  stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="spark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#A5F3FC"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- Card -->
  <rect x="8" y="8" width="184" height="184" rx="42" fill="url(#bg)"/>

  <!-- Top-left soft shine for depth -->
  <rect x="8" y="8" width="184" height="184" rx="42" fill="url(#shine)"/>

  <!-- Subtle inner border (glassmorphism hint) -->
  <rect x="9.5" y="9.5" width="181" height="181" rx="40.5"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="1"/>

  <!-- Sparkle glow halo -->
  <circle cx="152" cy="56" r="20" fill="#67E8F9" opacity="0.18"/>
  <circle cx="152" cy="56" r="14" fill="#67E8F9" opacity="0.32"/>

  <!-- 4-point sparkle -->
  <g transform="translate(152 56)">
    <path d="M0,-13 L3.2,-3.2 L13,0 L3.2,3.2 L0,13 L-3.2,3.2 L-13,0 L-3.2,-3.2 Z"
          fill="url(#spark)"/>
    <circle r="2.4" fill="#FFFFFF"/>
  </g>

  <!-- "te" wordmark -->
  <text x="100" y="122"
        text-anchor="middle"
        font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, 'Helvetica Neue', Arial, sans-serif"
        font-weight="800"
        font-size="108"
        letter-spacing="-7"
        fill="#FFFFFF">te</text>

  <!-- "tiny·erp" tag -->
  <text x="100" y="164"
        text-anchor="middle"
        font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, 'Helvetica Neue', Arial, sans-serif"
        font-weight="600"
        font-size="20"
        letter-spacing="5"
        fill="#BAE6FD">tiny·erp</text>
</svg>
